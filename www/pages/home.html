<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Painel - Suinda</title>
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/components.css" />
</head>
<body data-shell="true">
  <main class="screen app-screen with-bottom-nav">
    <header class="app-topbar">
      <button class="icon-button" data-drawer-open type="button" aria-label="Abrir menu">☰</button>
      <div>
        <p class="eyebrow">Painel</p>
        <h1 id="welcomeTitle" class="app-title">Seus cartões</h1>
        <p id="welcomeText" class="app-subtitle">Cartões disponíveis no seu perfil.</p>
      </div>
      <button class="icon-button" data-menu-toggle="homeMenu" type="button" aria-label="Ações">⋮</button>
      <div id="homeMenu" class="app-menu">
        <a href="decks.html">Baralhos</a>
        <a href="card-browser.html">Navegador</a>
        <a href="progress.html">Progresso</a>
        <button data-logout type="button">Sair</button>
      </div>
    </header>

    <p id="ankiTodayLine" class="daily-line">Carregando estudo de hoje...</p>

    <section class="card">
      <div class="section-head">
        <h2>Cartões do perfil</h2>
        <a class="text-link" href="add.html">Adicionar</a>
      </div>
      <div id="profileCards" class="card-browser-list"></div>
    </section>

    <nav class="bottom-nav">
      <a href="home.html" class="nav-item active">
        <span class="nav-icon">▦</span>
        <span class="nav-label">Painel</span>
      </a>
      <a href="decks.html" class="nav-item">
        <span class="nav-icon">▤</span>
        <span class="nav-label">Baralhos</span>
      </a>
      <a href="add.html" class="nav-item">
        <span class="nav-icon">＋</span>
        <span class="nav-label">Adicionar</span>
      </a>
      <a href="progress.html" class="nav-item">
        <span class="nav-icon">▥</span>
        <span class="nav-label">Progresso</span>
      </a>
    </nav>
  </main>

  <script src="../js/storage.js"></script>
  <script src="../js/mock.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/suinda-shell.js"></script>
  <script src="../js/progress.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/anki.js"></script>
  <script src="../js/app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      await renderAnkiTodayLine("ankiTodayLine");
      renderProfileCards();
    });
  </script>
</body>
</html>
