<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Suindá</title>
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/components.css" />
</head>
<body>
  <main class="screen center-screen">
    <section class="card auth-card">
      <div class="logo-box small">
        <div class="owl-icon">🦉</div>
        <h1>Suindá</h1>
        <p>Acesse sua plataforma de estudos</p>
      </div>

      <form id="loginForm" class="form">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="aluno@suinda.com" required />

        <label for="password">Senha</label>
        <input type="password" id="password" placeholder="******" required />

        <button type="submit" class="btn btn-primary">Entrar</button>
        <p id="loginMessage" class="message"></p>
        <p class="message">Aluno: aluno@suinda.com / 123456<br>Admin: admin@suinda.com / admin123</p>
      </form>
    </section>
  </main>

  <script src="../js/storage.js"></script>
  <script src="../js/mock.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>
